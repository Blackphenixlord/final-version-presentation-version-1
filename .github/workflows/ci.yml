name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend-quality:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nasa-hunch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nasa-hunch/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  edge-server-quality:
    name: Edge Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dlsm-temp/dlsm-inv-sys-client-main/services/edge-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dlsm-temp/dlsm-inv-sys-client-main/services/edge-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
